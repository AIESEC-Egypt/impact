<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Session Viewer</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
        .empty {
            font-family: system-ui, sans-serif;
            padding: 2rem;
            text-align: center;
            color: #444;
        }
    </style>
</head>
<body>
    <iframe id="viewerFrame" src=""></iframe>
    <p id="emptyMsg" class="empty" hidden>Open this page with ?url=… (Google Drive or Slides link).</p>

    <script>
        const params = new URLSearchParams(window.location.search);
        const url = params.get("url");
        if (url) {
            document.getElementById("viewerFrame").src = url;
        } else {
            document.getElementById("viewerFrame").hidden = true;
            document.getElementById("emptyMsg").hidden = false;
        }
    </script>
</body>
</html>
