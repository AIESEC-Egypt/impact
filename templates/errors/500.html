{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Something went wrong | IMPACT</title>
  <link rel="icon" href="{% static 'aspects/icon.png' %}" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; display: flex; justify-content: center; align-items: center;
      background: linear-gradient(135deg, #b00020, #6f42c1);
      font-family: 'Unbounded', sans-serif; text-align: center; padding: 20px; color: #fff;
    }
    .container {
      padding: 40px; background: rgba(255, 255, 255, 0.1); border-radius: 20px;
      backdrop-filter: blur(12px); max-width: 520px; width: 100%;
    }
    h1 { font-size: 1.5rem; margin-bottom: 14px; }
    p { font-weight: 300; line-height: 1.6; margin-bottom: 22px; font-size: 0.92rem; }
    a.btn {
      padding: 12px 26px; border-radius: 50px; background: #fff; color: #b00020;
      text-decoration: none; font-size: 0.88rem; display: inline-block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Something went wrong</h1>
    <p>We could not complete your request. Please try again in a moment.</p>
    <p>If the problem continues, contact <strong>{{ support_contact }}</strong>.</p>
    <a class="btn" href="{% url 'home' %}">Back to home</a>
  </div>
</body>
</html>
