{% load static lms_extras %}
<header class="impact-topbar">
  <a class="brand" href="{% url 'home' %}">
    <img
      class="impact-topbar__logo"
      src="{% static 'aspects/impact.png' %}"
      alt="IMPACT — AIESEC in Egypt"
    />
  </a>
  <div class="userbox">
    {% if user.is_authenticated %}
      {% with account_name=user|navbar_account_name %}
      {% if account_name %}
      <span class="impact-topbar__name">{{ account_name }}</span>
      {% endif %}
      {% if user.is_staff %}
        <a href="{% url 'admin:index' %}">Admin</a>
      {% endif %}
      <a href="{% url 'accounts:logout' %}">Logout</a>
      {% endwith %}
    {% else %}
      <a href="{% url 'accounts:login' %}">Login</a>
    {% endif %}
  </div>
</header>
